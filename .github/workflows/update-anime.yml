name: Update anime metadata

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: anirilis-auto-update

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Update anime
        run: npm run update:data
        env:
          SOURCE_URL: https://v2.samehadaku.how/
          MAX_ITEMS: '24'

      - name: Simpan perubahan
        run: |
          if git diff --quiet -- assets/js/data.js assets/data; then
            echo "Tidak ada rilisan baru."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/js/data.js assets/data
          git commit -m "Update anime metadata"
          git push
